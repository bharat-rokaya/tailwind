<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100">

  <!-- Navbar -->
  <header class="sticky top-0 bg-white shadow p-4 text-xl font-bold">
    My Cart
  </header>

  <!-- Cart Container -->
  <div id="cart-container" class="p-6 space-y-4"></div>

  <!-- Total -->
  <div class="p-6 bg-blue-100 shadow mt-4">
    <h2 class="text-xl font-bold text-green-500">
      Total: $<span id="total">0</span>
    </h2>

    <button id="checkout" 
      class="mt-4 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition duration-200 eae hover:scale-105">
      Checkout
    </button>
  </div>

  <script src="cart.js"></script>
</body>
</html>
